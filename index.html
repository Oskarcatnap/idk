<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OscarWeb Engine - Home</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #00ffcc;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
            max-width: 600px;
            width: 90%;
        }
        h1 {
            color: #00ffcc;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        p {
            color: #a0a0a0;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .cat-logo {
            font-size: 5rem;
            margin: 20px 0;
            display: inline-block;
        }
        .links-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }
        .btn {
            background-color: #333;
            color: #fff;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background-color: #007acc;
            border-color: #007acc;
            color: white;
            box-shadow: 0 0 10px rgba(0, 122, 204, 0.5);
        }
        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="cat-logo">`>:3`</div>
        <h1>OscarWeb Engine v3.0</h1>
        <p>Welcome, Master! This is the official home page of your ultimate custom browser running on Garuda Linux.</p>
        
        <div class="links-grid">
            <a href="https://google.com" class="btn">🔍 Search Google</a>
            <a href="https://github.com&oskarcatnap" class="btn">🐙 GitHub Profile</a>
            <a href="https://youtube.com" class="btn">📺 Watch YouTube</a>
            <a href="https://wikipedia.org" class="btn">📚 Wikipedia</a>
        </div>

        <div class="footer">
            Powered by Python, PyQt6 & Chromium Core | 2026
        </div>
    </div>

</body>
</html>
